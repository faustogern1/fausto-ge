<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Problem solving on networks — Fausto Gernone</title>
<meta name="description" content="Interactive agent-based model of collective problem solving on networks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:   #0d0f12;
    --secondary: #005ae1;
    --sans: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; font-family: var(--sans); background: #0b0d10; }
  .bar {
    display: flex; align-items: baseline; gap: 14px;
    padding: 10px 16px; background: #ffffff; border-bottom: 1px solid #e8eaee;
  }
  .bar a { color: var(--secondary); text-decoration: none; font-size: 14px; }
  .bar a:hover { text-decoration: underline; }
  .bar .name { color: var(--primary); font-weight: 600; }
  .bar .tag { font-family: var(--mono); font-size: 12.5px; color: #474747; }
  .stage { position: relative; flex: 1; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    background: #0b0d10; color: #c7ccd2; text-align: center; padding: 24px;
  }
  #overlay .spin {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid #2a323c; border-top-color: #66aaff;
    animation: r 1s linear infinite;
  }
  @keyframes r { to { transform: rotate(360deg); } }
  #overlay p { margin: 0; font-size: 15px; max-width: 480px; line-height: 1.55; }
  #overlay .small { font-size: 13px; color: #8a929b; }
  #overlay a { color: #66aaff; }
</style>
</head>
<body>

<div class="bar">
  <a class="name" href="https://fausto.ge/">Fausto Gernone</a>
  <span class="tag">problem solving on networks — interactive model</span>
  <a href="https://fausto.ge/research.html" style="margin-left:auto;">research</a>
</div>

<div class="stage">
  <iframe id="app" src="https://problem-solving-model.onrender.com" title="Problem-solving model" allow="fullscreen"></iframe>
  <div id="overlay">
    <div class="spin"></div>
    <p>Waking the simulation server&hellip;</p>
    <p class="small">This demo runs on free hosting that sleeps when idle &mdash; the first
    visit can take up to a minute. It loads automatically when ready.</p>
    <noscript><p>JavaScript is required. Open the app directly:
      <a href="https://problem-solving-model.onrender.com">problem-solving-model.onrender.com</a></p></noscript>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  document.getElementById('app').addEventListener('load', () => {
    overlay.style.display = 'none';
  });
  // If nothing loads within 95 s, assume the server is unreachable.
  setTimeout(() => {
    if (overlay.style.display !== 'none') {
      overlay.innerHTML = '<p>The simulation server did not respond.</p>' +
        '<p class="small">Try again in a minute, or open it directly: ' +
        '<a href="https://problem-solving-model.onrender.com">problem-solving-model.onrender.com</a></p>';
    }
  }, 95000);
</script>

</body>
</html>
